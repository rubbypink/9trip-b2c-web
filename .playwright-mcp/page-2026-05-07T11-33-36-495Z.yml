                      - generic [ref=e273]: — Thông tin sản phẩm —
                    - paragraph [ref=e274]: Sun World Hạ Long là quần thể vui chơi – giải trí quy mô lớn hàng đầu miền Bắc, tọa lạc tại khu du lịch Bãi Cháy – TP. Hạ Long, Quảng Ninh.
                    - paragraph [ref=e275]:
                      - generic [ref=e276]: Tổ hợp bao gồm Công viên Rồng, Công viên Nước, Cáp treo Nữ Hoàng và Đồi Mặt Trời, mang đến trải nghiệm giải trí đa dạng từ cảm giác mạnh, vui chơi dưới nước đến ngắm cảnh trên cao.
                    - paragraph [ref=e277]:
                      - generic [ref=e278]: Đặt vé Sun World Hạ Long trên IVIVU.com, bạn dễ dàng sở hữu vé điện tử tiện lợi, thanh toán nhanh và vào cổng không cần xếp hàng.
                    - paragraph [ref=e279]: 🚠 Cáp treo Nữ Hoàng sở hữu cabin hai tầng đạt kỷ lục thế giới, mang đến hành trình vượt biển độc đáo và tầm nhìn toàn cảnh Vịnh Hạ Long từ trên cao. Trải nghiệm lý tưởng để ngắm cảnh, chụp ảnh và tận hưởng Hạ Long theo một góc nhìn hoàn toàn khác.
                    - paragraph [ref=e280]:
                      - img [ref=e281]
                    - paragraph [ref=e282]: "🎡 Đồi Mặt Trời & Sun Wheel:"
                    - paragraph [ref=e283]: Ngồi trên cabin của Sun Wheel Hạ Long, du khách có cơ hội chiêm ngưỡng toàn cảnh thành phố biển sôi động và vẻ đẹp Hạ Long từ một góc nhìn trên cao đầy ấn tượng.
                    - paragraph [ref=e284]:
                      - img [ref=e285]
                    - paragraph [ref=e286]: Đồi Mặt Trời là khu tham quan – vui chơi trên cao tại Sun World Hạ Long, quy tụ Sun Wheel – Vòng quay Mặt Trời, vườn Nhật Bản, hồ cá Koi, nhà Bonsai, khu tâm linh và nhiều điểm check-in cảnh quan. Ngoài các trải nghiệm tham quan miễn phí, du khách còn có thể tham gia các hoạt động giải trí trả phí như rạp phim 2D, khu trải nghiệm thực tế ảo VR, làng rèn Thần Kiếm và khu trò chơi điện tử.
                    - img [ref=e288]
                    - paragraph [ref=e289]: 🐉 Công Viên Rồng (Dragon Park)
                    - paragraph [ref=e290]: Bước vào thế giới phiêu lưu và phấn khích tại Công viên Rồng, viên ngọc quý của Sun World Hạ Long - Công viên giải trí hấp dẫn được thiết kế dành cho những người thích cảm giác mạnh và cả gia đình, với hàng loạt trò chơi và điểm tham quan hấp dẫn hứa hẹn mang đến những trải nghiệm khó quên.
                    - img [ref=e292]
                    - paragraph [ref=e293]: 🌊 Công Viên Nước Typhoon Water Park
                    - paragraph [ref=e294]: Typhoon Water Park là công viên nước ngoài trời mang chủ đề “Cơn lốc nhiệt đới”, nơi du khách có thể thỏa sức vui chơi với đường trượt xoắn ốc, hồ tạo sóng, sông lười và khu vui chơi dành riêng cho trẻ em. Không gian sôi động, mát mẻ và đa dạng trò chơi, trở thành lựa chọn lý tưởng cho gia đình và nhóm bạn trong những ngày hè tại Hạ Long.
